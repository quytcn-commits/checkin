services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
    volumes:
      - ./data:/app/data        # giữ DB + ảnh trên ổ đĩa VPS (không mất khi rebuild)
    expose:
      - "3000"
    # Nếu KHÔNG dùng Caddy (chỉ test HTTP), bỏ comment dòng dưới để mở port trực tiếp.
    # LƯU Ý: HTTP thì camera/GPS sẽ KHÔNG chạy trên điện thoại.
    # ports:
    #   - "3000:3000"

  # Reverse proxy + tự động cấp SSL (Let's Encrypt). Cần 1 domain trỏ về IP VPS.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
