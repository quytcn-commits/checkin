services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
    volumes:
      - ./data:/app/data        # giữ DB + ảnh trên ổ đĩa VPS (không mất khi rebuild)
    ports:
      # Cloudflare (SSL mode = Flexible) nối tới origin qua HTTP cổng 80.
      # Trình duyệt vẫn thấy HTTPS nhờ chứng chỉ Cloudflare ở edge → camera/GPS chạy bình thường.
      - "80:3000"

# Ghi chú: phương án này khớp với cấu hình sinhnhat (Flexible + origin HTTP).
# Nếu sau này muốn mã hoá luôn chặng Cloudflare↔VPS: dùng Cloudflare Origin
# Certificate + Caddy/nginx phục vụ 443 và đặt rule SSL = Full (strict).
