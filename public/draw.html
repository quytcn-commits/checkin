<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quay số may mắn</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<!-- Login -->
<div class="card" id="login" style="max-width:380px;margin:60px auto">
  <p class="step-title">🎰 Quay số may mắn</p>
  <label>Mật khẩu quản trị</label>
  <input id="pw" type="password" placeholder="Mật khẩu admin" />
  <button class="btn" id="btn-login">Vào trang quay số</button>
  <div class="msg" id="login-msg"></div>
</div>

<!-- Stage -->
<div id="stage" class="draw-stage hidden">
  <img id="winner-photo" class="winner-photo hidden" alt="" />
  <div class="draw-prize" id="prize-label"></div>
  <div class="draw-name" id="name">Sẵn sàng quay 🎉</div>
  <div class="draw-dept" id="dept"></div>
  <div class="draw-dept" id="pool-info" style="margin-top:18px"></div>

  <div class="draw-controls">
    <input type="text" id="prize" placeholder="Tên giải (VD: Giải Nhất - iPhone)" style="width:auto;min-width:240px" />
    <button class="btn" id="btn-spin">🎲 QUAY</button>
    <button class="btn secondary" id="btn-reload">↻ Cập nhật DS</button>
  </div>

  <div class="winners-list" id="winners"></div>
</div>

<script src="/draw.js"></script>
</body>
</html>
